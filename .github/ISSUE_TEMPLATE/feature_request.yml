name: Idea / feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Check the open issues first — your idea may already be
        planned (or deliberately out of scope).
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What are you trying to do that peerd can't (or makes hard) today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you'd like
      description: The capability or change, as concretely as you can put it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches.
