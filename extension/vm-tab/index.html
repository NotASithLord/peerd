<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>peerd · WebVM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='2' y='3' width='12' height='10' rx='1.5' fill='%23f59e0b'/%3E%3Crect x='3.5' y='4.5' width='9' height='7' fill='%230d1117'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/vendor/xterm/xterm.css">
  <link rel="stylesheet" href="/shared/brand.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- No header / no footer. The terminal IS the page.
       Identification is the tab title + amber favicon; reboot is Cmd-R. -->

  <!-- Boot console: shown until CheerpX is ready, replaced by xterm below.
       Styled as a shell from the first frame — dmesg log flowing from the
       top-left, the current stage as a live prompt line. The spinning peerd
       orb doubles as the prompt glyph and is the only color on screen. -->
  <div id="vm-boot" class="boot-card">
    <div class="boot-banner" aria-hidden="true"><span class="peerd-brand"><span class="b-p">p</span><span class="b-e">e</span><span class="b-e2">e</span><span class="b-r">r</span><span class="b-d">d</span></span> · webvm — linux on webassembly · tty0</div>
    <pre id="boot-log" class="boot-log"></pre>
    <div class="boot-prompt">
      <span class="boot-spinner" aria-hidden="true"></span><h2 id="boot-stage">Starting…</h2><span id="boot-detail" class="muted">Streaming Debian disk image into IndexedDB. First boot takes ~10s.</span><span class="boot-caret" aria-hidden="true"></span>
    </div>
  </div>

  <!-- xterm mount point: hidden until ready. -->
  <div id="vm-terminal" hidden></div>

  <!-- Floating export — downloads a .peerd vm recipe (base image URL +
       integrity pin; the disk overlay deliberately stays local). -->
  <button id="export-btn" title="Download a .peerd recipe (base image + integrity pin — disk contents stay local)" hidden>export ⤓</button>

  <!-- xterm.js + addon-fit loaded as classic scripts so they attach to globalThis. -->
  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/xterm/addon-fit.js"></script>
  <script type="module" src="/vm-tab/vm-tab.js"></script>
</body>
</html>
