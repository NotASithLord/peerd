<!--
  peerd wordmark — the brand five-block mark, matching the website and
  the extension side panel EXACTLY: white lowercase letters on the five
  module-color blocks (p cyan / e red / e amber / r green / d magenta),
  abutting into one bar with the outer corners rounded. The letters are
  Geist Mono 700 at font-size 1.05x the block (the site/extension spec;
  see extension/sidepanel/styles.css .wordmark .block), CONVERTED TO
  OUTLINE PATHS so the mark renders identically with no font dependency.
  Regenerate from extension/shared/fonts/GeistMono.woff2 if the brand
  font or block spec changes.
-->
