<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>peerd · local-runner bench — Gemma-4-E2B (WebGPU) vs Haiku</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; --bg:#111; --fg:#eaeaea; --muted:#8a8a8a; --border:#333; --good:#22C55E; --bad:#EF4444; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); }
  main { max-width:980px; margin:0 auto; padding:24px 20px 80px; }
  h1 { font-size:18px; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 20px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
  button { font:inherit; padding:8px 14px; background:#1d1d1d; color:var(--fg); border:1px solid var(--border); border-radius:6px; cursor:pointer; }
  button:hover:not(:disabled) { border-color:var(--muted); }
  button:disabled { opacity:.5; cursor:default; }
  input { font:inherit; padding:8px 10px; background:#1d1d1d; color:var(--fg); border:1px solid var(--border); border-radius:6px; flex:1; min-width:240px; }
  #log { white-space:pre-wrap; color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:10px 12px; margin:14px 0; min-height:40px; max-height:160px; overflow:auto; }
  .card { border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin:14px 0; }
  .card h3 { margin:0 0 8px; font-size:14px; }
  .snap { color:var(--muted); white-space:pre-wrap; font-size:12px; background:#181818; border-radius:6px; padding:8px 10px; max-height:140px; overflow:auto; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
  .col h4 { margin:0 0 4px; font-size:12px; color:var(--muted); }
  .out { white-space:pre-wrap; background:#181818; border-radius:6px; padding:8px 10px; min-height:36px; }
  .stat { color:var(--muted); font-size:12px; margin-top:6px; }
  .stat b { color:var(--fg); }
  @media (max-width:720px){ .cols{grid-template-columns:1fr;} }
</style>
</head>
<body>
<main>
  <h1>peerd · local-runner bench</h1>
  <p class="sub">Does <b>Gemma-4-E2B</b> (WebGPU, local) read web pages well enough — and fast enough — to back the do/get/check <b>read path</b> (get/check), vs <b>Haiku</b>? Same prompts, side by side. See <code>docs/LOCAL-INFERENCE.md</code>.</p>

  <div class="row">
    <button id="load">1 · Load Gemma-4-E2B (downloads ~2–3 GB once, then OPFS-cached)</button>
  </div>
  <div class="row">
    <input id="key" type="password" placeholder="Anthropic API key (optional — for the Haiku column)" autocomplete="off">
  </div>
  <div class="row">
    <button id="run" disabled>2 · Run the read-prompts</button>
    <span class="sub" id="hint" style="margin:0">Load Gemma first. WebGPU required (Chrome/Edge; localhost or https).</span>
  </div>

  <div id="log">idle.</div>
  <div id="results"></div>
</main>

<script type="module">
// Transformers.js from CDN — DEV BENCH ONLY. The shippable feature vendors
// transformers.js + ORT-WASM locally (CWS-clean); see LOCAL-INFERENCE.md.
import {
  AutoProcessor, Gemma4ForConditionalGeneration, AutoModelForCausalLM, AutoTokenizer, TextStreamer,
} from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers';

const MODEL_ID = 'onnx-community/gemma-4-E2B-it-ONNX';
const HAIKU = 'claude-haiku-4-5-20251001';

// System framing the runner gives a page-reader. Gemma has no system role, so
// we fold it into the first user turn (Haiku gets it as the system param).
const SYS = 'You are a precise web-page reader inside a browser agent. Answer the TASK using ONLY the page snapshot below. Be concise and exact; quote values verbatim. If the snapshot does not contain the answer, say so.';

// Realistic do/get/check READ tasks over peerd-style pseudo-a11y snapshots.
const PROMPTS = [
  {
    name: 'extract a value',
    task: 'What is the order total, and how many items are in the cart?',
    snapshot:
`main "Checkout"
  heading "Your cart (2 items)"
  listitem
    text "Aeron Chair — Size B"  text "$1,395.00"  spinbutton "Qty" value "1"
  listitem
    text "Desk mat, felt"        text "$45.00"     spinbutton "Qty" value "2"
  region "Order summary"
    text "Subtotal"  text "$1,485.00"
    text "Shipping"  text "$0.00"
    text "Tax"       text "$133.65"
    text "Total"     text "$1,618.65"
  button "Place order"`,
  },
  {
    name: 'boolean check + evidence',
    task: 'Is a user signed in? If yes, what is their name and plan?',
    snapshot:
`banner
  link "Dashboard"  link "Billing"  link "Settings"
  button "Account menu"
    text "Jordan Lee"  text "Pro plan"  link "Sign out"
main "Dashboard"
  heading "Welcome back, Jordan"
  text "3 projects · 12 deployments this week"`,
  },
  {
    name: 'count + first-result title',
    task: 'How many search results are shown on this page, and what is the title of the first one?',
    snapshot:
`main "Search: wireless headphones"
  text "Showing 1–3 of 248 results"
  list
    listitem  link "Sony WH-1000XM6 Wireless Headphones"  text "$399.99"  text "★★★★½ (2,104)"
    listitem  link "Bose QuietComfort Ultra"               text "$429.00"  text "★★★★½ (1,556)"
    listitem  link "Apple AirPods Max (USB-C)"             text "$549.00"  text "★★★★☆ (903)"
  navigation "Pagination"  link "1"  link "2"  link "Next"`,
  },
];

const $ = (id) => document.getElementById(id);
const log = (m) => { $('log').textContent = m; console.log('[bench]', m); };
const fmt = (ms) => ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${Math.round(ms)}ms`;

let processor = null, model = null, isCausalLM = false;

$('load').onclick = async () => {
  $('load').disabled = true;
  const t0 = performance.now();
  try {
    log(`loading ${MODEL_ID} on WebGPU … first run downloads ~2–3 GB (cached after).`);
    try {
      processor = await AutoProcessor.from_pretrained(MODEL_ID);
      model = await Gemma4ForConditionalGeneration.from_pretrained(MODEL_ID, { dtype: 'q4f16', device: 'webgpu' });
    } catch (e) {
      // Fallback if this transformers.js build lacks the Gemma-4 class.
      log(`Gemma4 class unavailable (${e.message}) — falling back to AutoModelForCausalLM.`);
      processor = await AutoTokenizer.from_pretrained(MODEL_ID);
      model = await AutoModelForCausalLM.from_pretrained(MODEL_ID, { dtype: 'q4f16', device: 'webgpu' });
      isCausalLM = true;
    }
    log(`Gemma loaded in ${fmt(performance.now() - t0)}. Click "Run the read-prompts".`);
    $('run').disabled = false;
  } catch (e) {
    log(`load failed: ${e.message}\n\nNeed a WebGPU browser (Chrome/Edge) on localhost or https, and a recent @huggingface/transformers that supports Gemma 4.`);
    $('load').disabled = false;
  }
};

async function genGemma(userText) {
  // Gemma has no system role — fold the framing into the user turn.
  const tok = isCausalLM ? processor : processor.tokenizer;
  let inputs;
  if (isCausalLM) {
    inputs = processor.apply_chat_template(
      [{ role: 'user', content: `${SYS}\n\n${userText}` }],
      { add_generation_prompt: true, return_dict: true },
    );
  } else {
    // The documented onnx-community/gemma-4-E2B-it-ONNX flow (model card).
    const messages = [{ role: 'user', content: [{ type: 'text', text: `${SYS}\n\n${userText}` }] }];
    const prompt = processor.apply_chat_template(messages, { add_generation_prompt: true });
    inputs = await processor(prompt);
  }
  let firstAt = 0, n = 0, out = '';
  const start = performance.now();
  const streamer = new TextStreamer(tok, {
    skip_prompt: true, skip_special_tokens: true,
    callback_function: (text) => { if (!firstAt) firstAt = performance.now(); n++; out += text; },
  });
  await model.generate({ ...inputs, max_new_tokens: 256, do_sample: false, streamer });
  const end = performance.now();
  const ttft = (firstAt || end) - start;
  const decodeS = (end - (firstAt || end)) / 1000;
  return { text: out.trim(), ttftMs: ttft, totalMs: end - start, tokPerSec: n > 1 && decodeS > 0 ? n / decodeS : 0 };
}

async function genHaiku(userText, key) {
  const start = performance.now();
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json', 'x-api-key': key,
      'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: HAIKU, max_tokens: 256, system: SYS, messages: [{ role: 'user', content: userText }] }),
  });
  const j = await res.json();
  const ms = performance.now() - start;
  if (!res.ok) return { text: `error ${res.status}: ${j?.error?.message ?? JSON.stringify(j)}`, totalMs: ms };
  return { text: (j?.content?.[0]?.text ?? '(no text)').trim(), totalMs: ms };
}

$('run').onclick = async () => {
  $('run').disabled = true; $('load').disabled = true;
  const key = $('key').value.trim();
  $('results').innerHTML = '';
  // Warm-up: the first generate compiles WebGPU shaders (one-time), so its
  // timing is not representative — run it silently first.
  log('warming up Gemma (one-time shader compile) …');
  try { await genGemma('Reply with the single word: ready.'); } catch (e) { log(`warm-up failed: ${e.message}`); $('run').disabled = false; return; }

  for (const p of PROMPTS) {
    const card = document.createElement('div'); card.className = 'card';
    const userText = `PAGE SNAPSHOT:\n${p.snapshot}\n\nTASK: ${p.task}`;
    card.innerHTML = `<h3>${p.name} — <span style="color:var(--muted);font-weight:normal">${p.task}</span></h3>
      <div class="snap">${p.snapshot.replace(/</g,'&lt;')}</div>
      <div class="cols">
        <div class="col"><h4>Gemma-4-E2B (local, WebGPU)</h4><div class="out" data-g>running…</div><div class="stat" data-gs></div></div>
        <div class="col"><h4>Haiku</h4><div class="out" data-h>${key ? 'running…' : '(paste a key to compare)'}</div><div class="stat" data-hs></div></div>
      </div>`;
    $('results').appendChild(card);
    log(`running: ${p.name}`);

    try {
      const g = await genGemma(userText);
      card.querySelector('[data-g]').textContent = g.text || '(empty)';
      card.querySelector('[data-gs]').innerHTML = `prefill TTFT <b>${fmt(g.ttftMs)}</b> · decode <b>${g.tokPerSec.toFixed(0)} tok/s</b> · total <b>${fmt(g.totalMs)}</b>`;
    } catch (e) { card.querySelector('[data-g]').textContent = `error: ${e.message}`; }

    if (key) {
      try {
        const h = await genHaiku(userText, key);
        card.querySelector('[data-h]').textContent = h.text;
        card.querySelector('[data-hs]').innerHTML = `total (incl. network) <b>${fmt(h.totalMs)}</b>`;
      } catch (e) { card.querySelector('[data-h]').textContent = `error: ${e.message}`; }
    }
  }
  log('done. Eyeball the outputs for correctness; compare the timings. (Local has no network hop but pays prefill; Haiku pays the round-trip but prefills server-side.)');
  $('run').disabled = false; $('load').disabled = false;
};
</script>
</body>
</html>
