<?xml version="1.0" encoding="UTF-8"?>
<!--
  peerd favicon — the brand icon: white "p" over the five module-color
  stripes, edge-to-edge (no padding). The "p" is the Geist Mono glyph at
  weight 700, OUTLINED to a vector path (no embedded font) so it renders
  in browser tabs, where SVG favicons don't load @font-face. Extracted
  from the SAME vendored variable font the extension wordmark uses
  (extension/shared/fonts/GeistMono.woff2, wght 700), so the favicon, the
  extension tabs, and the store icon all show an identical "p".
  Framing matches the icon PNGs: centered x=48, baseline y=66, size 100.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <clipPath id="r"><rect width="96" height="96" rx="8" ry="8"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect y="0"    width="96" height="19.2" fill="#00BCE5"/>
    <rect y="19.2" width="96" height="19.2" fill="#EF4444"/>
    <rect y="38.4" width="96" height="19.2" fill="#F59E0B"/>
    <rect y="57.6" width="96" height="19.2" fill="#22C55E"/>
    <rect y="76.8" width="96" height="19.2" fill="#DB2777"/>
  </g>
